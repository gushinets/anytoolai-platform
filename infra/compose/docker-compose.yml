services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: anytoolai
      POSTGRES_PASSWORD: anytoolai
      POSTGRES_DB: anytoolai
    ports:
      - "${ANYTOOLAI_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anytoolai -d anytoolai"]
      interval: 2s
      timeout: 3s
      retries: 30
  platform-api:
    build:
      context: ../..
      dockerfile: infra/docker/platform-api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://anytoolai:anytoolai@postgres:5432/anytoolai
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ANYTOOLAI_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 2s
      timeout: 3s
      retries: 30
  platform-worker:
    build:
      context: ../..
      dockerfile: infra/docker/platform-worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://anytoolai:anytoolai@postgres:5432/anytoolai
    depends_on:
      postgres:
        condition: service_healthy
