provider_policies:
  - provider_policy_id: default_fake_provider_v1
    provider: fake
    model: fake-json-v1
    temperature: 0.0
    timeout_seconds: 30
    max_retries: 1
    structured_output_mode: json_schema
    metadata:
      fixture_strategy: deterministic_metadata_key
  - provider_policy_id: default_text_generation_v1
    provider: litellm
    model: anytoolai.default_text
    temperature: 0.3
    timeout_seconds: 60
    max_retries: 2
    structured_output_mode: json_schema
    metadata:
      model_group: anytoolai.default_text
      routing_profile: default_text
