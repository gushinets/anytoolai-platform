provider_policies:
  - provider_policy_id: default_fake_provider_v1
    provider: fake
    model: fake-json-v1
    temperature: 0.0
    timeout_seconds: 30
    retry_policy:
      transport:
        owner: provider_gateway_litellm_sdk
        max_attempts: 1
        litellm_num_retries_per_attempt: 0
      validation:
        owner: pydantic_ai
        max_attempts: 1
      hard_limits:
        max_physical_provider_calls_per_action: 2
    structured_output_mode: json_schema
  - provider_policy_id: default_text_generation_v1
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.3
    timeout_seconds: 60
    retry_policy:
      transport:
        owner: provider_gateway_litellm_sdk
        max_attempts: 2
        litellm_num_retries_per_attempt: 0
      validation:
        owner: pydantic_ai
        max_attempts: 2
      hard_limits:
        max_physical_provider_calls_per_action: 4
    structured_output_mode: json_schema
