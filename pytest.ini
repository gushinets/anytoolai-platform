[pytest]
testpaths = tests packages/backend/platform-core/tests packages/backend/platform-actions/tests packages/backend/platform-sdk/tests
addopts = -q
markers =
    smoke: end-to-end smoke tests
    architecture: repository architecture tests
    slow: slower stress or concurrency tests that are not part of the default fast path
    postgresql: PostgreSQL-backed integration tests that require a disposable database URL
