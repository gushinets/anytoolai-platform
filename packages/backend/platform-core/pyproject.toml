[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anytoolai-platform-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "jsonschema>=4.26.0",
    "litellm>=1.89.3",
    "pydantic==2.13.4",
    "pyyaml",
    "sqlalchemy>=2.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
