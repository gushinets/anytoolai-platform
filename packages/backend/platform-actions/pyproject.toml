[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anytoolai-platform-actions"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anytoolai-platform-core",
    "pydantic-ai-slim>=2.2.0",
    "sqlalchemy>=2.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
anytoolai-platform-core = { path = "../platform-core", editable = true }
