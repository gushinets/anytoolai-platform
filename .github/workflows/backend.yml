name: baseline-backend
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  baseline:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
      - run: uv sync --frozen --group dev
      - run: uv run python scripts/agent/runner.py doctor
      - run: uv run python scripts/agent/runner.py quick-check
  full-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.34.1
      - run: uv sync --frozen --group dev
      - run: uv run python scripts/agent/runner.py full-check
  postgresql-quota-concurrency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: anytoolai
          POSTGRES_PASSWORD: anytoolai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anytoolai -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
      - run: uv sync --frozen --group dev
      - run: >-
          uv pip install --no-deps
          -e packages/backend/platform-sdk
          -e packages/backend/platform-core
          -e packages/backend/platform-actions
          -e apps/platform-api
      - run: uv run python -m pytest apps/platform-api/tests/test_quota_concurrency_postgresql.py -m "slow and postgresql" -q
        env:
          ANYTOOLAI_POSTGRES_TEST_DATABASE_URL: postgresql+psycopg://anytoolai:anytoolai@127.0.0.1:5432/postgres
